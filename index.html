<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monthly Billings</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1219;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background: #1a1f2e;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 1.5rem;
      width: 100%;
      max-width: 520px;
    }

    .card-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.5px;
      color: #6b7280;
      margin-bottom: 1.5rem;
    }

    .chart-container {
      position: relative;
      width: 100%;
      height: 280px;
    }

    .legend {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      font-size: 12px;
      color: #9ca3af;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }
  </style>
</head>
<body>

  <div class="card">
    <p class="card-title">MONTHLY BILLINGS</p>

    <div class="chart-container">
      <canvas id="billings"></canvas>
    </div>

    <div class="legend">
      <span class="legend-item">
        <span class="legend-swatch" style="background: #d97706;"></span>Energy
      </span>
      <span class="legend-item">
        <span class="legend-swatch" style="background: #00e5a0;"></span>Cloud
      </span>
      <span class="legend-item">
        <span class="legend-swatch" style="background: #8b5cf6;"></span>Total
      </span>
    </div>
  </div>

  <script>
    const energy = [243, 127, 119];
    const cloud = [383, 212, 212];
    const total = energy.map((v, i) => v + cloud[i]);

    new Chart(document.getElementById('billings'), {
      type: 'bar',
      data: {
        labels: ['Apr', 'May', 'Jun'],
        datasets: [
          {
            label: 'Energy',
            data: energy,
            backgroundColor: '#d97706',
            borderRadius: 3,
            barPercentage: 0.75,
            categoryPercentage: 0.6
          },
          {
            label: 'Cloud',
            data: cloud,
            backgroundColor: '#00e5a0',
            borderRadius: 3,
            barPercentage: 0.75,
            categoryPercentage: 0.6
          },
          {
            label: 'Total',
            data: total,
            backgroundColor: '#8b5cf6',
            borderRadius: 3,
            barPercentage: 0.75,
            categoryPercentage: 0.6
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#272d3d',
            titleColor: '#e5e7eb',
            bodyColor: '#d1d5db',
            borderColor: 'rgba(255,255,255,0.08)',
            borderWidth: 1,
            cornerRadius: 8,
            padding: 10,
            callbacks: {
              label: function(ctx) {
                return ctx.dataset.label + ': R' + ctx.parsed.y + 'K';
              }
            }
          }
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { color: '#6b7280', font: { size: 12 } },
            border: { display: false }
          },
          y: {
            grid: { color: 'rgba(107,114,128,0.15)' },
            ticks: {
              color: '#6b7280',
              font: { size: 11 },
              callback: function(v) { return 'R' + v + 'K'; }
            },
            border: { display: false },
            beginAtZero: true
          }
        }
      },
      plugins: [{
        afterDatasetsDraw: function(chart) {
          const meta = chart.getDatasetMeta(2);
          const ctx = chart.ctx;
          ctx.save();
          ctx.font = '500 11px sans-serif';
          ctx.fillStyle = '#d1d5db';
          ctx.textAlign = 'center';
          meta.data.forEach(function(bar, i) {
            ctx.fillText('R' + total[i] + 'K', bar.x, bar.y - 8);
          });
          ctx.restore();
        }
      }]
    });
  </script>

</body>
</html>
